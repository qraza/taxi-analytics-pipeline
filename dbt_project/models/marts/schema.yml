version: 2

models:
  - name: mart_trip_summary
    description: "Daily trip stats aggregated by pickup zone"
    columns:
      - name: trip_date
        description: "Date of trips"
        data_tests:
          - not_null
      - name: pickup_location_id
        description: "Pickup zone ID"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_taxi_zones')
                field: location_id
      - name: pickup_zone
        description: "Pickup zone name"
      - name: pickup_borough
        description: "NYC borough"
      - name: total_trips
        description: "Number of trips"
        data_tests:
          - not_null
      - name: avg_distance_miles
        description: "Average trip distance in miles"
        data_tests:
          - not_null
      - name: avg_fare_usd
        description: "Average fare amount"
        data_tests:
          - not_null
      - name: total_revenue_usd
        description: "Total revenue"
        data_tests:
          - not_null
