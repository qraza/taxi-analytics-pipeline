version: 2

models:
  - name: mart_trip_summary
    description: "Daily trip stats aggregated by pickup zone"
    columns:
      - name: trip_date
        description: "Date of trips"
        data_tests:
          - not_null
      - name: pickup_location_id
        description: "Pickup zone ID"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_taxi_zones')
                field: location_id
      - name: pickup_zone
        description: "Pickup zone name"
        data_tests:
          - not_null
      - name: pickup_borough
        description: "NYC borough"
        data_tests:
          - not_null
      - name: total_trips
        description: "Number of trips"
        data_tests:
          - not_null
      - name: avg_distance_miles
        description: "Average trip distance in miles"
        data_tests:
          - not_null
      - name: avg_duration_minutes
        description: "Average trip duration in minutes"
        data_tests:
          - not_null
      - name: avg_fare_usd
        description: "Average fare amount"
        data_tests:
          - not_null
      - name: avg_tip_usd
        description: "Average tip amount"
        data_tests:
          - not_null
      - name: total_revenue_usd
        description: "Total revenue"
        data_tests:
          - not_null
      - name: avg_passengers
        description: "Average passenger count"
        data_tests:
          - not_null

  - name: mart_daily_kpis
    description: "Daily trip KPIs aggregated across all pickup zones"
    columns:
      - name: trip_date
        description: "Date of trips"
        data_tests:
          - not_null
      - name: total_trips
        description: "Number of trips"
        data_tests:
          - not_null
      - name: total_revenue_usd
        description: "Total revenue"
        data_tests:
          - not_null
      - name: total_tip_usd
        description: "Total tip amount"
        data_tests:
          - not_null
      - name: avg_fare_usd
        description: "Average fare amount"
        data_tests:
          - not_null
      - name: avg_duration_minutes
        description: "Average trip duration in minutes"
        data_tests:
          - not_null
      - name: avg_tip_pct
        description: "Average tip amount as a fraction of fare amount"
        data_tests:
          - not_null
      - name: airport_trip_share
        description: "Share of trips with pickup or dropoff at an airport zone (0-1)"
        data_tests:
          - not_null

  - name: mart_payment_mix
    description: "Payment method mix and average tip, aggregated by pickup borough and pickup hour"
    columns:
      - name: pickup_borough
        description: "NYC borough"
        data_tests:
          - not_null
      - name: payment_method
        description: "Human-readable payment method"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Credit card"
                  - "Cash"
                  - "No charge"
                  - "Dispute"
                  - "Unknown"
      - name: pickup_hour
        description: "Hour of day of pickup (0-23)"
        data_tests:
          - not_null
      - name: total_trips
        description: "Number of trips in this borough/payment method/hour bucket"
        data_tests:
          - not_null
      - name: avg_tip_usd
        description: "Average tip amount"
        data_tests:
          - not_null
      - name: avg_tip_pct
        description: "Average tip amount as a fraction of fare amount"
        data_tests:
          - not_null
      - name: payment_share
        description: "Share of trips using this payment method within the borough/hour bucket (0-1)"
        data_tests:
          - not_null

  - name: mart_hourly_patterns
    description: "Trip patterns aggregated by month, day of week, and pickup hour"
    columns:
      - name: pickup_month
        description: "Month of pickup, YYYY-MM"
        data_tests:
          - not_null
      - name: pickup_day_of_week
        description: "Day of week of pickup"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Monday"
                  - "Tuesday"
                  - "Wednesday"
                  - "Thursday"
                  - "Friday"
                  - "Saturday"
                  - "Sunday"
      - name: pickup_hour
        description: "Hour of day of pickup (0-23)"
        data_tests:
          - not_null
      - name: total_trips
        description: "Number of trips in this month/day-of-week/hour bucket"
        data_tests:
          - not_null
      - name: avg_trips_per_day
        description: "Average trips per occurrence of this month/day-of-week/hour bucket (total_trips / distinct dates that day-of-week occurs in that month)"
        data_tests:
          - not_null
      - name: avg_fare_usd
        description: "Average fare amount"
        data_tests:
          - not_null
      - name: avg_tip_pct
        description: "Average tip amount as a fraction of fare amount"
        data_tests:
          - not_null
