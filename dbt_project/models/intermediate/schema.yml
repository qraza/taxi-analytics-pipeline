version: 2

models:
  - name: int_trips_enriched
    description: "Trip-grain fact enriched with pickup/dropoff zone info and derived time/business metrics"
    columns:
      - name: pickup_location_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_taxi_zones')
                field: location_id
      - name: dropoff_location_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_taxi_zones')
                field: location_id
      - name: trip_date
        data_tests:
          - not_null
      - name: fare_amount
        data_tests:
          - not_null
      - name: total_amount
        data_tests:
          - not_null
      - name: pickup_zone
        description: "Pickup zone name (joined from taxi zone lookup)"
      - name: dropoff_zone
        description: "Dropoff zone name (joined from taxi zone lookup)"
      - name: pickup_day_of_week
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Monday"
                  - "Tuesday"
                  - "Wednesday"
                  - "Thursday"
                  - "Friday"
                  - "Saturday"
                  - "Sunday"
      - name: tip_pct
        description: "Tip amount as a fraction of fare amount"
        data_tests:
          - not_null
      - name: avg_speed_mph
        description: "Average speed in miles per hour (trip distance / trip duration in minutes, x60); null when trip_duration_minutes is 0"
      - name: is_airport_trip
        description: "True if the pickup or dropoff zone name contains 'Airport'"
        data_tests:
          - not_null
